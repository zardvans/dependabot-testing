version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Asia/Singapore"
    cooldown:
      default-days: 5
    groups:
      laravel:
        patterns:
          - "laravel/*"
          - "illuminate/*"
      php-tooling:
        dependency-type: "development"
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
      timezone: "Asia/Singapore"
    cooldown:
      default-days: 5
    groups:
      frontend:
        dependency-type: "production"
        patterns:
          - "*"
      frontend-tooling:
        dependency-type: "development"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Asia/Singapore"
    cooldown:
      default-days: 5
    groups:
      github-actions:
        patterns:
          - "*"
